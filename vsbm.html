<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="user-scalable=no">
<title>Multi Fractal Viewer</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #000;
}
canvas {
    position: absolute;
    top: 0;
    left: 0;
    mix-blend-mode: screen;
    opacity: 0.9;
}
</style>
</head>

<body>

<script>
// ===== FULLSCREEN =====
function goFullscreen() {
    const elem = document.documentElement;
    if (elem.requestFullscreen) elem.requestFullscreen();
}
goFullscreen();
document.addEventListener("click", goFullscreen, { once: true });

// ===== SHADERS =====
const VSHADER_SOURCE = `
precision highp float;
attribute vec4 position;
varying vec3 dir;
uniform vec3 right, forward, up;
uniform float x,y;

void main() {
    gl_Position = position;
    dir = forward + right * position.x*x + up * position.y*y;
}
`;

const FSHADER_SOURCE = `
precision highp float;

float kernal(vec3 ver){
    vec3 a = ver;
    float b,c,d;
    for(int i=0;i<5;i++){
        b=length(a);
        c=atan(a.y,a.x)*8.0;
        d=acos(a.z/b)*8.0;
        b=pow(b,8.0);
        a=vec3(b*sin(d)*cos(c),b*sin(d)*sin(c),b*cos(d))+ver;
        if(b>6.0) break;
    }
    return 4.0-dot(a,a);
}

varying vec3 dir;
uniform vec3 right, forward, up, origin;
uniform float len;

void main() {
    vec3 color = vec3(0.0);
    float step = 0.002;

    float v1 = kernal(origin + dir * (step*len));

    for (int k = 2; k < 500; k++) {
        float dist = step*len*float(k);
        vec3 p = origin + dir * dist;
        float v = kernal(p);

        if (v > 0.0 && v1 < 0.0) {
            vec3 n = normalize(vec3(
                kernal(p - vec3(0.001,0,0)) - kernal(p + vec3(0.001,0,0)),
                kernal(p - vec3(0,0.001,0)) - kernal(p + vec3(0,0.001,0)),
                kernal(p - vec3(0,0,0.001)) - kernal(p + vec3(0,0,0.001))
            ));

            float light = max(dot(n, normalize(vec3(0.3,0.9,0.3))),0.0);
            color = vec3(0.5 + 0.5*sin(length(p)*5.0)) * light;
            break;
        }

        v1 = v;
    }

    gl_FragColor = vec4(color,1.0);
}
`;

// ===== INSTANCES =====
const instances = [];

function createInstance(i) {
    const canvas = document.createElement("canvas");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    document.body.appendChild(canvas);

    const gl = canvas.getContext("webgl");

    const vert = gl.createShader(gl.VERTEX_SHADER);
    const frag = gl.createShader(gl.FRAGMENT_SHADER);
    const program = gl.createProgram();

    gl.shaderSource(vert, VSHADER_SOURCE);
    gl.compileShader(vert);

    gl.shaderSource(frag, FSHADER_SOURCE);
    gl.compileShader(frag);

    gl.attachShader(program, vert);
    gl.attachShader(program, frag);
    gl.linkProgram(program);
    gl.useProgram(program);

    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
        -1,-1,0, 1,-1,0, 1,1,0,
        -1,-1,0, 1,1,0, -1,1,0
    ]), gl.STATIC_DRAW);

    const pos = gl.getAttribLocation(program, "position");
    gl.vertexAttribPointer(pos, 3, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(pos);

    instances.push({
        gl,
        canvas,
        ang1: 2.8 + i*0.4,
        ang2: 0.4 + i*0.2,
        len: 1.6,
        uniforms: {
            right: gl.getUniformLocation(program,'right'),
            forward: gl.getUniformLocation(program,'forward'),
            up: gl.getUniformLocation(program,'up'),
            origin: gl.getUniformLocation(program,'origin'),
            x: gl.getUniformLocation(program,'x'),
            y: gl.getUniformLocation(program,'y'),
            len: gl.getUniformLocation(program,'len')
        }
    });
}

// create 5 canvases
for (let i = 0; i < 5; i++) createInstance(i);

// ===== LOOP =====
function loop() {
    for (let inst of instances) {
        const gl = inst.gl;
        inst.ang1 += 0.01;

        gl.viewport(0,0,inst.canvas.width,inst.canvas.height);

        const cx = inst.canvas.width;
        const cy = inst.canvas.height;

        gl.uniform1f(inst.uniforms.x, cx*2/(cx+cy));
        gl.uniform1f(inst.uniforms.y, cy*2/(cx+cy));
        gl.uniform1f(inst.uniforms.len, inst.len);

        const ox = inst.len*Math.cos(inst.ang1)*Math.cos(inst.ang2);
        const oy = inst.len*Math.sin(inst.ang2);
        const oz = inst.len*Math.sin(inst.ang1)*Math.cos(inst.ang2);

        gl.uniform3f(inst.uniforms.origin, ox,oy,oz);
        gl.uniform3f(inst.uniforms.right, Math.sin(inst.ang1),0,-Math.cos(inst.ang1));
        gl.uniform3f(inst.uniforms.up,
            -Math.sin(inst.ang2)*Math.cos(inst.ang1),
            Math.cos(inst.ang2),
            -Math.sin(inst.ang2)*Math.sin(inst.ang1)
        );
        gl.uniform3f(inst.uniforms.forward,
            -Math.cos(inst.ang1)*Math.cos(inst.ang2),
            -Math.sin(inst.ang2),
            -Math.sin(inst.ang1)*Math.cos(inst.ang2)
        );

        gl.drawArrays(gl.TRIANGLES,0,6);
    }

    requestAnimationFrame(loop);
}

loop();

// resize fix
window.onresize = () => {
    for (let inst of instances) {
        inst.canvas.width = window.innerWidth;
        inst.canvas.height = window.innerHeight;
    }
};
</script>

</body>
</html>
